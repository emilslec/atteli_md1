<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>daļiņu sistēma</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="particleCanvas"></canvas>
    <div id="freqSliderSlot">
      <p>Frequency value: <span id="freqSliderValue"> 10 </span></p>
      <input type="range" id="freqSlider" min="1" max="50" value="10" />
    </div>
    <div id="speedSliderSlot">
      <p>Speed value: <span id="speedSliderValue"> 5 </span></p>
      <input type="range" id="speedSlider" min="0.1" max="30" value="5" />
    </div>
    <div id="spawnSliderSlot">
      <p>Spawn count value: <span id="spawnCountSliderValue"> 5 </span></p>
      <input type="range" id="spawnCountSlider" min="1" max="100" value="5" />
    </div>
  </body>
  <script src="dist/main.js"></script>

  <style>
    #freqSliderSlot {
      top: 10px;
      left: 10px;
    }

    #speedSliderSlot {
      top: 90px;
      left: 10px;
    }

    #spawnSliderSlot {
      top: 170px;
      left: 10px;
    }

    div {
      position: absolute;
      z-index: 10;
      color:white;
    }
  </style>
</html>
